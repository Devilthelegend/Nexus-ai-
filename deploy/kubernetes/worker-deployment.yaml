apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-worker
  namespace: nexus
  labels:
    app.kubernetes.io/name: nexusai
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: nexusai
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nexusai
        app.kubernetes.io/component: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: worker
          image: ghcr.io/nexusai/api:latest
          imagePullPolicy: IfNotPresent
          command:
            - celery
            - -A
            - app.workers.celery_app.celery_app
            - worker
            - -Q
            - ingestion
            - --concurrency
            - "4"
          envFrom:
            - configMapRef:
                name: nexus-config
            - secretRef:
                name: nexus-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          livenessProbe:
            exec:
              command:
                - celery
                - -A
                - app.workers.celery_app.celery_app
                - inspect
                - ping
            initialDelaySeconds: 30
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
